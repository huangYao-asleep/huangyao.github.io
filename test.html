<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的矿井时光轴</title>
    <style>
        /* 全局重置 & 背景贴图 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 背景图：可以用纯色渐变模拟岩壁，也可以换成你自己的图片 */
            background-image: url('https://www.transparenttextures.com/patterns/rocky-wall.png'); /* 免费岩壁纹理 */
            background-color: #2a2418;  /* 深褐色底 */
            background-repeat: repeat;
            background-attachment: fixed; /* 背景固定，滚动时岩壁不动 */
            font-family: 'Courier New', 'Consolas', monospace; /* 等宽字体，像矿井日志 */
            color: #e6d5b8;
            padding: 2rem 1rem;
        }

        /* 矿井容器：所有内容居中，主轴位置 */
        .mine-shaft {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            padding: 2rem 0;
        }

        /* 纵向主轴：一条贯穿的粗线，像矿道钢索 */
        .mine-shaft::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 6px;
            background: linear-gradient(to bottom, #b87c4f, #5a3e2b, #2c1e12);
            transform: translateX(-50%);
            box-shadow: 0 0 8px rgba(255, 215, 150, 0.6);
            border-radius: 3px;
            z-index: 1;
        }

        /* 每个时间轴条目（矿车轨道） */
        .timeline-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 3rem 0;
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(2px);
            border-radius: 16px;
            padding: 1.2rem;
            transition: all 0.3s ease;
            border-left: 4px solid #c99e6f;
        }

        /* 鼠标悬停时，像矿灯照亮 */
        .timeline-entry:hover {
            background: rgba(30, 20, 12, 0.85);
            box-shadow: 0 0 20px rgba(255, 180, 80, 0.3);
            transform: translateX(5px);
        }

        /* 时间戳（左侧） */
        .timestamp {
            flex: 0 0 120px;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #f5bc70;
            text-shadow: 0 0 3px #3a280f;
            background: #1f170e;
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #b87c4f;
        }

        /* 内容区域（右侧） */
        .content {
            flex: 1;
            padding-left: 1.5rem;
            font-size: 1rem;
            line-height: 1.5;
        }

        .content h3 {
            font-size: 1.3rem;
            color: #f3d382;
            margin-bottom: 0.3rem;
        }

        .content p {
            color: #ddcca5;
        }

        /* 奇数条目让时间戳在右，内容在左（增加矿道交错感） */
        .timeline-entry:nth-child(odd) {
            flex-direction: row-reverse;
            border-left: none;
            border-right: 4px solid #c99e6f;
        }
        .timeline-entry:nth-child(odd) .content {
            padding-left: 0;
            padding-right: 1.5rem;
            text-align: right;
        }

        /* 矿井入口标题 */
        .mine-header {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
            z-index: 2;
        }
        .mine-header h1 {
            font-size: 2.8rem;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #e0b074, #7a562e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 0px #1f170e;
        }
        .mine-header p {
            margin-top: 0.5rem;
            font-style: italic;
            color: #b89a6e;
        }

        /* 底部深度指示 */
        .depth-marker {
            text-align: center;
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #b87c4f;
            border-top: 1px dashed #6b4c2c;
            padding-top: 1.5rem;
        }

        /* 响应式：手机版主轴变细，条目堆叠 */
        @media (max-width: 700px) {
            .mine-shaft::before {
                left: 20px;
                width: 4px;
            }
            .timeline-entry {
                flex-direction: column !important;
                align-items: flex-start;
                margin-left: 30px;
            }
            .timeline-entry .content {
                padding-left: 0 !important;
                padding-right: 0 !important;
                text-align: left !important;
                margin-top: 0.5rem;
            }
            .timestamp {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="mine-shaft">
    <div class="mine-header">
        <h1>⛏️ 我的矿井时光轴 ⛏️</h1>
        <p>向下挖掘，越深越珍贵</p >
    </div>

    <!-- 条目按时间倒序（最新在上，越往下越旧） -->
    <div class="timeline-entry">
        <div class="timestamp">2025年3月</div>
        <div class="content">
            <h3>学会了做陶艺</h3>
            <p>第一次拉坯成功，做了个歪歪扭扭的杯子，但很有成就感。</p >
        </div>
    </div>

    <div class="timeline-entry">
        <div class="timestamp">2024年12月</div>
        <div class="content">
            <h3>读完《地下室手记》</h3>
            <p>“我唯一担心的是，我配不上我所受的苦难。” 久久不能平静。</p >
        </div>
    </div>

    <div class="timeline-entry">
        <div class="timestamp">2024年8月</div>
        <div class="content">
            <h3>开始学Python数据分析</h3>
            <p>用pandas清理了人生第一份杂乱表格，感觉打开了新世界。</p >
        </div>
    </div>

    <div class="timeline-entry">
        <div class="timestamp">2023年11月</div>
        <div class="content">
            <h3>独自去云南旅行</h3>
            <p>在大理看了苍山日落，在丽江听了民谣。</p >
        </div>
    </div>

    <div class="timeline-entry">
        <div class="timestamp">2022年7月</div>
        <div class="content">
            <h3>大学毕业</h3>
            <p>告别了图书馆的常坐位置，和好友各奔东西。</p >
        </div>
    </div>

    <div class="depth-marker">
        ⚒️ 深度：-5 层 · 继续向下挖掘 ⚒️
    </div>
</div>

</body>
</html>
